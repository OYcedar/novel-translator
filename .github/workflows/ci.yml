name: CI

on:
  push:
    branches:
      - main
      - perfect
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test dependencies
        run: python -m pip install -e ".[dev,epub]"

      - name: Compile Python sources
        run: python -m compileall app tests

      - name: Check CLI command catalog
        run: python main.py --agent-mode commands --json

      - name: Run tests
        run: python -m pytest -q

      - name: Build package
        run: python -m build
