[llm]
base_url = "https://api.example.com/v1"
api_key = "YOUR_API_KEY"
model = "example-model"
timeout = 600

[translation]
target_language = "zh-Hans"
source_language = "auto"
system_prompt_file = "prompts/novel_translation_system.md"
batch_max_chars = 4000
retry_count = 3
retry_delay = 2
quality_passes = 2
fail_on_placeholder_mismatch = true
fail_on_empty_translation = true

[context]
previous_paragraphs = 3
next_paragraphs = 2
chapter_summary_max_chars = 1200

[review]
mode = "risk"
sample_ratio = 0.05
max_items_per_run = 200
severity_threshold = "medium"

[automation]
workers = 200
rpm = 200
tpm = 0
stop_on_warning = false
auto_retry_failed = true
folder_input_dir = "../原文"
folder_output_dir = "../已翻译"
work_records_dir = "../workspace/books"

[export]
bilingual = false

[quality]
source_residual_patterns = [
  "[\\u3040-\\u30ff]+",
  "[A-Za-z]{24,}",
]

[epub]
parser = "auto"
include_non_linear_spine = false
preserve_outer_markup = true
warn_on_ruby = true
warn_on_duplicate_source = true
translate_nav = true
translate_toc = true
preserve_inline_tags = true
inline_safe_tags = ["span", "strong", "em", "a"]
